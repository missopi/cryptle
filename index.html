<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cryptle</title>
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/welcome_styles.css">
  <script src="scripts/welcome_scripts.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="welcome-module">
      <div class="welcome-module-content">
        <div role="img" aria-label="Cryptle" class="welcome-module-icon" style="background-image: var(--cryptle-icon);">
        </div>
        <h1 class="welcome-module-title">Cryptle</h1>
        <h2 class="welcome-module-subtitle">Crack the code.</h2>
        <div class="welcome-module-buttons">
          <fieldset class="welcome-module-difficulty">
            <legend class="welcome-module-difficulty-legend">Difficulty</legend>
            <input class="welcome-module-difficulty-input" type="radio" name="difficulty" id="difficulty-easy"
              value="easy">
            <label class="welcome-module-difficulty-button" for="difficulty-easy">Easy</label>
            <input class="welcome-module-difficulty-input" type="radio" name="difficulty" id="difficulty-medium"
              value="medium" checked>
            <label class="welcome-module-difficulty-button" for="difficulty-medium">Medium</label>
            <input class="welcome-module-difficulty-input" type="radio" name="difficulty" id="difficulty-hard"
              value="hard">
            <label class="welcome-module-difficulty-button" for="difficulty-hard">Hard</label>
          </fieldset>
          <a href="game_screens/medium_game.html" class="welcome-module-button" id="play-button">Play</a>
        </div>
        <div class="welcome-module-date-container">
          <div class="welcome-module-date" id="welcome-module-date"></div>
          <div class="welcome-module-count" id="welcome-module-count"></div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
