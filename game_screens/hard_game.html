<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cryptle-Hard</title>
  <link rel="stylesheet" href="../styles/index.css">
  <link rel="stylesheet" href="../styles/game_styles.css">
  <script src="../scripts/game_logic.js" defer></script>
  <script src="../scripts/game_visuals.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="game-container">
      <header class="toolbar-header">
        <section class="toolbar-section">
          <div class="settings-menu">
            <button class="settings-cog-button" id="settings-cog-button" type="button" aria-label="Open settings menu"
              aria-haspopup="true" aria-expanded="false" aria-controls="settings-dropdown">
              <img class="settings-cog-icon" src="../assets/settings-cog.svg" alt="" aria-hidden="true">
            </button>
            <div class="settings-dropdown hidden" id="settings-dropdown" role="menu" aria-label="Settings">
              <button class="settings-close-button" id="settings-close-button" type="button" aria-label="Close settings menu">
                <img class="settings-close-icon" src="../assets/X.svg" alt="" aria-hidden="true">
              </button>
              <h2>Settings</h2>
              <label class="settings-option" for="dark-mode-toggle">
                <span>Dark mode</span>
                <input id="dark-mode-toggle" type="checkbox" role="menuitemcheckbox">
              </label>
              <label class="settings-option" for="high-contrast-mode-toggle">
                <span class="settings-option-copy">
                  <span class="settings-option-title">High Contrast mode</span>
                  <span class="settings-option-subtitle">Colourblindness and contrast adjustments</span>
                </span>
                <input id="high-contrast-mode-toggle" type="checkbox" role="menuitemcheckbox">
              </label>
              <button class="settings-option settings-link-button" id="how-to-play-button" type="button">
                <span class="settings-option-title">How to Play</span>
              </button>
            </div>
            <div class="settings-dropdown how-to-play-modal hidden" id="how-to-play-modal" role="dialog" aria-modal="true" aria-labelledby="how-to-play-title">
              <button class="settings-close-button" id="how-to-play-close-button" type="button" aria-label="Close how to play">
                <img class="settings-close-icon" src="../assets/X.svg" alt="" aria-hidden="true">
              </button>
              <h2 id="how-to-play-title">How to Play</h2>
              <p>Solve the 4-colour code in 6 guesses. The same colour could be used more than once.</p>
              <p>After each guess, pegs show feedback:</p>
              <p><span class="how-to-play-peg" data-state="correct" aria-hidden="true"></span> Correct colour and position</p>
              <p><span class="how-to-play-peg" data-state="almost" aria-hidden="true"></span> Correct colour in a different position</p>
              <p><span class="how-to-play-peg" data-state="incorrect" aria-hidden="true"></span> Not in the code</p>
            </div>
          </div>
        </section>
      </header>
      <main class="game-module">
        <div class="game-board-container">
          <div class="game-board">
            <div class="game-row" id="row-1">
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-peg-container">
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
              </div>
            </div>
            <div class="game-row" id="row-2">
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-peg-container">
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
              </div>
            </div>
            <div class="game-row" id="row-3">
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-peg-container">
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
              </div>
            </div>
            <div class="game-row" id="row-4">
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-peg-container">
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
              </div>
            </div>
            <div class="game-row" id="row-5">
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-peg-container">
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
              </div>
            </div>
            <div class="game-row" id="row-6">
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-peg-container">
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
                <div class="game-peg" data-state="empty"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="game-codeboard game-codeboard-hard">
          <div class="random code-display hidden" id="daily-code-container">
            <p class="random-code-text">Today's code: <span id="daily-code-display"></span></p>
            <p class="game-over-message" id="game-over-message" aria-live="polite"></p>
            <div class="share-results-container" id="share-results-container">
              <button class="code-action-button" id="share-results-button" type="button">SHARE</button>
              <p class="share-results-feedback" id="share-results-feedback" aria-live="polite"></p>
            </div>
          </div>
          <div class="codeboard-row">
            <div class="codeboard-tile-container">
              <button class="codeboard-tile" type="button" aria-label="Pink tile" data-key="pink"></button>
            </div>
            <div class="codeboard-tile-container">
              <button class="codeboard-tile" type="button" aria-label="Blue tile" data-key="blue"></button>
            </div>
            <div class="codeboard-tile-container">
              <button class="codeboard-tile" type="button" aria-label="Green tile" data-key="green"></button>
            </div>
            <div class="codeboard-tile-container">
              <button class="codeboard-tile" type="button" aria-label="Brown tile" data-key="brown"></button>
            </div>
            <div class="codeboard-tile-container">
              <button class="codeboard-tile" type="button" aria-label="Red tile" data-key="red"></button>
            </div>
          </div>
          <div class="codeboard-row">
            <div class="codeboard-tile-container">
              <button class="codeboard-tile" type="button" aria-label="Yellow tile" data-key="yellow"></button>
            </div>
            <div class="codeboard-tile-container">
              <button class="codeboard-tile" type="button" aria-label="Orange tile" data-key="orange"></button>
            </div>
            <div class="codeboard-tile-container">
              <button class="codeboard-tile" type="button" aria-label="Purple tile" data-key="purple"></button>
            </div>
          </div>
          <div class="code-actions-row">
            <button class="code-action-button" id="delete-button">DELETE</button>
            <button class="code-action-button" id="enter-button">ENTER</button>
          </div>
        </div>
      </main>
      <footer class="module-footer"></footer>
    </div>
  </div>
</body>

</html>
