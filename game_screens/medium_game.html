<!DOCTYPE html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cryptle-Medium</title>
  <link rel="stylesheet" href="../styles/game_styles.css">
  <script src="../scripts/game_scripts.js" defer></script>

                <div class="game-peg" data-state="empty"></div>

              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>
              <div class="game-tile-container">

                <div class="game-tile" data-state="empty"></div>
              </div>

                <div class="game-tile" data-state="empty"></div>

                <div class="game-peg" data-state="empty"></div>

                <div class="game-tile" data-state="empty"></div>
              </div>

              </div>
              <div class="game-tile-container">
                <div class="game-tile" data-state="empty"></div>
              </div>

            <img class="codeboard-tile" src="../assets/code_colours/blue.svg" alt="Blue tile" role="button" tabindex="0">
            <img class="codeboard-tile" src="../assets/code_colours/green.svg" alt="Green tile" role="button" tabindex="0">

            <img class="codeboard-tile" src="../assets/code_colours/purple.svg" alt="Purple tile" role="button" tabindex="0">
          </div>
          <div class="code-actions-row">
            <button class="code-action-button" id="delete-button">Delete</button>
            <button class="code-action-button" id="enter-button">Enter</button>
          </div>
        </div>
      </main>
      <footer class="module-footer"></footer>
    </div>
