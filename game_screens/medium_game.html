<!DOCTYPE html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cryptle-Medium</title>
  <link rel="stylesheet" href="../styles/index.css">
  <link rel="stylesheet" href="../styles/game_styles.css">

                <div class="game-peg" id="peg-three" data-state="empty"></div>

                <div class="game-peg" id="peg-two" data-state="empty"></div>
              </div>
            </div>
            <div class="game-row" id="row-3">
              <div class="game-tile-container">

            </div>

              <div class="codeboard-tile" alt="blue tile" data-key="blue" role="button">
